<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌲 TreeCut Crew Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/plugin/weekday.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/plugin/isBetween.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .calendar-day { transition: all 0.2s; }
        .calendar-day:hover { transform: scale(1.02); background-color: #f0fdf4; }
        .crew-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 9999px; cursor: pointer; }
        .note-text { font-size: 0.7rem; line-height: 1.2; color: #666; font-style: italic; }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 font-sans min-h-screen">
    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 bg-white rounded-3xl shadow p-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-green-700 text-white rounded-2xl flex items-center justify-center text-3xl">🌲</div>
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold text-green-800">TreeCut Crew Scheduler</h1>
                    <p class="text-green-600">Professional Crew Management</p>
                </div>
            </div>
            <div class="flex flex-wrap gap-3">
                <button onclick="goToToday()" class="px-6 py-3 bg-white border-2 border-green-700 text-green-700 rounded-2xl hover:bg-green-50 font-medium flex items-center gap-2">
                    <i class="fas fa-calendar-day"></i> Today
                </button>
                <button onclick="showShareInfo()" class="px-6 py-3 bg-green-700 text-white rounded-2xl hover:bg-green-800 font-medium flex items-center gap-2">
                    <i class="fas fa-share-alt"></i> Setup Sync
                </button>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-wrap items-center gap-4 mb-6 bg-white p-4 rounded-3xl shadow">
            <div class="flex gap-2">
                <button onclick="setView('year')" id="year-btn" class="view-btn px-6 py-2.5 rounded-2xl text-sm font-medium">Year</button>
                <button onclick="setView('month')" id="month-btn" class="view-btn px-6 py-2.5 rounded-2xl text-sm font-medium bg-green-700 text-white">Month</button>
                <button onclick="setView('week')" id="week-btn" class="view-btn px-6 py-2.5 rounded-2xl text-sm font-medium">Week</button>
                <button onclick="setView('day')" id="day-btn" class="view-btn px-6 py-2.5 rounded-2xl text-sm font-medium">Day</button>
            </div>
            
            <div class="flex-1 flex justify-center items-center gap-4">
                <button onclick="prevPeriod()" class="w-10 h-10 flex items-center justify-center text-green-700 hover:bg-green-100 rounded-full"><i class="fas fa-chevron-left"></i></button>
                <div id="current-period" class="text-xl font-semibold text-green-800 min-w-[200px] text-center"></div>
                <button onclick="nextPeriod()" class="w-10 h-10 flex items-center justify-center text-green-700 hover:bg-green-100 rounded-full"><i class="fas fa-chevron-right"></i></button>
            </div>
            
            <button onclick="refreshFromSheet()" class="px-5 py-3 bg-white border border-emerald-600 text-emerald-700 rounded-2xl hover:bg-emerald-50 flex items-center gap-2">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <div id="calendar-container" class="bg-white rounded-3xl shadow-2xl p-6 md:p-8 min-h-[650px]"></div>
    </div>

    <!-- Assignment Modal -->
    <div id="assignment-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl w-full max-w-lg mx-4 shadow-2xl">
            <div class="p-8">
                <h3 id="modal-date-title" class="text-2xl font-bold text-green-800 mb-2"></h3>
                <p id="modal-date-subtitle" class="text-green-600 mb-8"></p>
                <div id="shift-sections" class="space-y-8"></div>
            </div>
            <div class="border-t p-4 flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 text-gray-500 font-medium rounded-2xl hover:bg-gray-100">Cancel</button>
                <button onclick="saveToSheet()" class="flex-1 py-4 bg-green-700 text-white font-semibold rounded-2xl hover:bg-green-800">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Setup Modal -->
    <div id="share-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl max-w-md w-full mx-4 p-8">
            <h3 class="text-2xl font-bold mb-6">Setup Live Sync</h3>
            <input id="csv-url" type="text" placeholder="Paste your Web App URL here" class="w-full p-4 border rounded-2xl text-sm mb-4">
            <div class="flex gap-3">
                <button onclick="closeShareModal()" class="flex-1 py-4 border rounded-2xl">Close</button>
                <button onclick="saveUrlAndRefresh()" class="flex-1 py-4 bg-green-700 text-white rounded-2xl">Save & Test</button>
            </div>
        </div>
    </div>

    <script>
        dayjs.extend(dayjs_plugin_weekday);
        dayjs.extend(dayjs_plugin_isBetween);
        
        let currentDate = dayjs();
        let currentView = 'month';
        let assignments = {}; 
        let csvUrl = "https://script.google.com/macros/s/AKfycbzPuNAMPaX_Sgb-UJri57-tv_IwtHwW8Lq4y8huYl45kqST6Uoo9lEndPoKn4J08n48Tg/exec";
        const crews = ['Abdiel', 'Matt', 'Gamma', 'Delta', 'Echo', 'Foxtrot'];
        
        const colors = {
            'Abdiel': 'bg-blue-500 text-white',
            'Matt': 'bg-purple-500 text-white',
            'Gamma': 'bg-amber-500 text-white',
            'Delta': 'bg-rose-500 text-white',
            'Echo': 'bg-emerald-500 text-white',
            'Foxtrot': 'bg-indigo-500 text-white'
        };

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('bg-green-700', 'text-white'));
            document.getElementById(view + '-btn').classList.add('bg-green-700', 'text-white');
            renderCalendar();
        }

        function updatePeriodLabel() {
            const el = document.getElementById('current-period');
            if (currentView === 'month') el.textContent = currentDate.format('MMMM YYYY');
            else if (currentView === 'week') {
                const start = currentDate.startOf('week');
                el.textContent = `${start.format('MMM D')} - ${start.add(6, 'day').format('MMM D, YYYY')}`;
            } else if (currentView === 'day') el.textContent = currentDate.format('dddd, MMMM D, YYYY');
            else if (currentView === 'year') el.textContent = currentDate.format('YYYY');
        }

        function prevPeriod() { 
            if (currentView === 'year') currentDate = currentDate.subtract(1, 'year');
            else if (currentView === 'month') currentDate = currentDate.subtract(1, 'month');
            else if (currentView === 'week') currentDate = currentDate.subtract(1, 'week');
            else currentDate = currentDate.subtract(1, 'day');
            renderCalendar();
        }

        function nextPeriod() {
            if (currentView === 'year') currentDate = currentDate.add(1, 'year');
            else if (currentView === 'month') currentDate = currentDate.add(1, 'month');
            else if (currentView === 'week') currentDate = currentDate.add(1, 'week');
            else currentDate = currentDate.add(1, 'day');
            renderCalendar();
        }

        function goToToday() {
            currentDate = dayjs();
            renderCalendar();
        }

        async function refreshFromSheet() {
            if (!csvUrl) return;
            try {
                const response = await fetch(csvUrl + (csvUrl.includes('?') ? '&' : '?') + 't=' + Date.now());
                const text = await response.text();
                parseCsvData(text);
                renderCalendar();
            } catch (e) {
                console.error(e);
            }
        }

        function parseCsvData(csvText) {
            assignments = {};
            const rows = csvText.trim().split('\n');
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i].trim();
                if (!row) continue;
                const fields = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (fields.length >= 5) {
                    const dateStr = fields[0].replace(/^"|"$/g, '').trim();
                    if (dateStr) {
                        assignments[dateStr] = {
                            morning: (fields[1] || '').replace(/^"|"$/g, '').split(',').map(c => c.trim()).filter(Boolean),
                            morningNotes: (fields[2] || '').replace(/^"|"$/g, ''),
                            afternoon: (fields[3] || '').replace(/^"|"$/g, '').split(',').map(c => c.trim()).filter(Boolean),
                            afternoonNotes: (fields[4] || '').replace(/^"|"$/g, '')
                        };
                    }
                }
            }
        }

        function renderCalendar() {
            updatePeriodLabel();
            const container = document.getElementById('calendar-container');
            
            if (currentView === 'year') renderYearView(container);
            else if (currentView === 'month') renderMonthView(container);
            else if (currentView === 'week') renderWeekView(container);
            else renderDayView(container);
        }

        function renderYearView(container) {
            let html = `<div class="grid grid-cols-3 md:grid-cols-4 gap-6">`;
            for (let m = 0; m < 12; m++) {
                const monthDate = currentDate.month(m).startOf('month');
                html += `
                    <div class="border border-green-200 rounded-3xl p-4 hover:shadow-md cursor-pointer" onclick="selectMonth(${m})">
                        <div class="font-semibold text-green-700 mb-3 text-center">${monthDate.format('MMMM')}</div>
                        <div class="grid grid-cols-7 gap-px text-xs bg-green-50 p-2 rounded-xl">
                            ${generateMiniCalendar(monthDate)}
                        </div>
                    </div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function generateMiniCalendar(monthStart) {
            let html = '';
            const startDay = monthStart.day();
            const daysInMonth = monthStart.daysInMonth();
            const days = ['S','M','T','W','T','F','S'];
            days.forEach(d => html += `<div class="text-center text-green-500 font-medium">${d}</div>`);
            for (let i = 0; i < startDay; i++) html += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = monthStart.date(d).format('YYYY-MM-DD');
                const hasAssignment = assignments[dateKey] && (assignments[dateKey].morning.length > 0 || assignments[dateKey].afternoon.length > 0);
                html += `<div class="calendar-day aspect-square flex items-center justify-center text-xs rounded-lg ${hasAssignment ? 'bg-green-600 text-white' : 'hover:bg-white'}">${d}</div>`;
            }
            return html;
        }

        function selectMonth(m) {
            currentDate = currentDate.month(m);
            setView('month');
        }

        function renderMonthView(container) {
            const startOfMonth = currentDate.startOf('month');
            const daysInMonth = currentDate.daysInMonth();
            const startDay = startOfMonth.day();
            
            let html = `<div class="grid grid-cols-7 gap-px bg-green-100 p-2 rounded-3xl">`;
            ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => html += `<div class="text-center py-3 text-xs font-semibold text-green-600">${d}</div>`);
            
            for (let i = 0; i < startDay; i++) html += `<div class="bg-white min-h-[130px]"></div>`;
            
            for (let day = 1; day <= daysInMonth; day++) {
                const date = startOfMonth.date(day);
                const dateKey = date.format('YYYY-MM-DD');
                const dayData = assignments[dateKey] || {morning: [], afternoon: [], morningNotes: '', afternoonNotes: ''};
                
                html += `
                    <div onclick="selectDate('${dateKey}')" class="calendar-day bg-white min-h-[130px] p-2 border border-transparent hover:border-green-300 rounded-3xl cursor-pointer flex flex-col">
                        <div class="text-right text-sm font-medium">${day}</div>
                        <div class="flex-1 flex flex-wrap gap-1 content-start mt-1">
                            ${dayData.morning.map(crew => `<span class="crew-badge ${colors[crew]}">M:${crew}</span>`).join('')}
                            ${dayData.afternoon.map(crew => `<span class="crew-badge ${colors[crew]}">A:${crew}</span>`).join('')}
                        </div>
                        ${(dayData.morningNotes || dayData.afternoonNotes) ? `<div class="note-text mt-1">${dayData.morningNotes || dayData.afternoonNotes}</div>` : ''}
                    </div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function renderWeekView(container) {
            const start = currentDate.startOf('week');
            let html = `<div class="grid grid-cols-7 gap-4">`;
            
            for (let i = 0; i < 7; i++) {
                const day = start.add(i, 'day');
                const dateKey = day.format('YYYY-MM-DD');
                const dayData = assignments[dateKey] || {morning: [], afternoon: [], morningNotes: '', afternoonNotes: ''};
                
                html += `
                    <div onclick="selectDate('${dateKey}')" class="calendar-day bg-white rounded-3xl p-4 cursor-pointer border border-transparent hover:border-green-300">
                        <div class="text-xs uppercase tracking-widest text-gray-500">${day.format('ddd')}</div>
                        <div class="text-4xl font-light mb-4">${day.format('D')}</div>
                        <div class="space-y-1 text-xs">
                            ${dayData.morning.map(crew => `<div class="crew-badge ${colors[crew]}">M: ${crew}</div>`).join('')}
                            ${dayData.afternoon.map(crew => `<div class="crew-badge ${colors[crew]}">A: ${crew}</div>`).join('')}
                        </div>
                        ${(dayData.morningNotes || dayData.afternoonNotes) ? `<div class="note-text mt-2 text-[10px]">${dayData.morningNotes || dayData.afternoonNotes}</div>` : ''}
                    </div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function renderDayView(container) {
            const dateKey = currentDate.format('YYYY-MM-DD');
            const dayData = assignments[dateKey] || {morning: [], afternoon: [], morningNotes: '', afternoonNotes: ''};
            
            let html = `
                <div class="max-w-2xl mx-auto">
                    <div class="text-center mb-8">
                        <div class="text-5xl font-light">${currentDate.format('D')}</div>
                        <div class="text-3xl text-green-800">${currentDate.format('dddd, MMMM YYYY')}</div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-6">
                        <div onclick="selectDate('${dateKey}')" class="bg-white border border-green-200 rounded-3xl p-6 cursor-pointer">
                            <div class="flex items-center gap-3 mb-6">
                                <div class="text-3xl">🌅</div>
                                <div>
                                    <div class="font-semibold text-xl">Morning Shift</div>
                                    <div class="text-sm text-gray-500">6AM - 12PM</div>
                                </div>
                            </div>
                            <div class="flex flex-wrap gap-2" id="morning-crews"></div>
                            ${dayData.morningNotes ? `<div class="mt-4 p-3 bg-green-50 rounded-2xl text-sm">${dayData.morningNotes}</div>` : ''}
                        </div>
                        
                        <div onclick="selectDate('${dateKey}')" class="bg-white border border-green-200 rounded-3xl p-6 cursor-pointer">
                            <div class="flex items-center gap-3 mb-6">
                                <div class="text-3xl">☀️</div>
                                <div>
                                    <div class="font-semibold text-xl">Afternoon Shift</div>
                                    <div class="text-sm text-gray-500">12PM - 6PM</div>
                                </div>
                            </div>
                            <div class="flex flex-wrap gap-2" id="afternoon-crews"></div>
                            ${dayData.afternoonNotes ? `<div class="mt-4 p-3 bg-green-50 rounded-2xl text-sm">${dayData.afternoonNotes}</div>` : ''}
                        </div>
                    </div>
                </div>`;
            
            container.innerHTML = html;
            renderShiftCrews('morning', dayData.morning);
            renderShiftCrews('afternoon', dayData.afternoon);
        }

        function renderShiftCrews(shift, assigned) {
            const container = document.getElementById(shift + '-crews');
            if (!container) return;
            container.innerHTML = assigned.map(crew => `
                <div class="crew-badge ${colors[crew]} px-4 py-2">${crew}</div>
            `).join('');
        }

        let selectedDateKey = null;

        function selectDate(dateKey) {
            selectedDateKey = dateKey;
            const date = dayjs(dateKey);
            document.getElementById('modal-date-title').textContent = date.format('dddd, MMMM D');
            document.getElementById('modal-date-subtitle').textContent = date.format('YYYY');
            renderModalShifts();
            document.getElementById('assignment-modal').classList.remove('hidden');
        }

        function renderModalShifts() {
            const container = document.getElementById('shift-sections');
            const dayData = assignments[selectedDateKey] || {morning: [], afternoon: [], morningNotes: '', afternoonNotes: ''};
            
            container.innerHTML = `
                <div class="space-y-8">
                    <div>
                        <label class="block text-sm font-medium mb-3">🌅 Morning Shift (6AM-12PM)</label>
                        <div class="flex flex-wrap gap-2" id="modal-morning"></div>
                        <textarea id="morning-notes" class="w-full mt-3 p-3 border rounded-2xl text-sm h-20" placeholder="Morning shift notes...">${dayData.morningNotes || ''}</textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-3">☀️ Afternoon Shift (12PM-6PM)</label>
                        <div class="flex flex-wrap gap-2" id="modal-afternoon"></div>
                        <textarea id="afternoon-notes" class="w-full mt-3 p-3 border rounded-2xl text-sm h-20" placeholder="Afternoon shift notes...">${dayData.afternoonNotes || ''}</textarea>
                    </div>
                </div>
            `;
            
            renderCrewList('modal-morning', dayData.morning, 'morning');
            renderCrewList('modal-afternoon', dayData.afternoon, 'afternoon');
        }

        function renderCrewList(id, assigned, shiftType) {
            const el = document.getElementById(id);
            if (!el) return;
            el.innerHTML = crews.map(crew => `
                <div onclick="toggleCrew('${crew}', '${shiftType}')" class="crew-badge px-5 py-2 ${assigned.includes(crew) ? colors[crew] : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}">
                    ${crew}
                </div>
            `).join('');
        }

        function toggleCrew(crew, shiftType) {
            if (!assignments[selectedDateKey]) assignments[selectedDateKey] = {morning: [], afternoon: [], morningNotes: '', afternoonNotes: ''};
            const shiftArr = assignments[selectedDateKey][shiftType];
            const index = shiftArr.indexOf(crew);
            if (index > -1) {
                shiftArr.splice(index, 1);
            } else {
                shiftArr.push(crew);
            }
            renderModalShifts();
        }

        function closeModal() {
            document.getElementById('assignment-modal').classList.add('hidden');
            renderCalendar();
        }

        function saveToSheet() {
            const morningNotes = document.getElementById('morning-notes') ? document.getElementById('morning-notes').value.trim() : '';
            const afternoonNotes = document.getElementById('afternoon-notes') ? document.getElementById('afternoon-notes').value.trim() : '';
            
            if (!assignments[selectedDateKey]) assignments[selectedDateKey] = {morning: [], afternoon: [], morningNotes: '', afternoonNotes: ''};
            assignments[selectedDateKey].morningNotes = morningNotes;
            assignments[selectedDateKey].afternoonNotes = afternoonNotes;
            
            alert("✅ Changes saved successfully!");
            closeModal();
        }

        function showShareInfo() {
            document.getElementById('share-modal').classList.remove('hidden');
        }

        function closeShareModal() {
            document.getElementById('share-modal').classList.add('hidden');
        }

        function saveUrlAndRefresh() {
            csvUrl = document.getElementById('csv-url').value.trim();
            if (csvUrl) {
                closeShareModal();
                refreshFromSheet();
            }
        }

        window.onload = () => {
            renderCalendar();
            if (csvUrl) refreshFromSheet();
        };
    </script>
</body>
</html>
